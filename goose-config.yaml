GOOSE_PROVIDER: ollama
GOOSE_MODEL: qwen3-coder-next
OLLAMA_HOST: http://localhost:11434
extensions:
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  extensionmanager:
    enabled: true
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  apps:
    enabled: true
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  chatrecall:
    enabled: true
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  analyze:
    enabled: true
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  developer:
    enabled: true
    type: platform
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    bundled: true
    available_tools: []
  tom:
    enabled: true
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  web_search:
    name: web_search
    enabled: true
    type: stdio
    cmd: uvx
    args:
      - duckduckgo-mcp-server
    description: Free web search via DuckDuckGo (no API key required)
    display_name: Web Search (DuckDuckGo)
    bundled: false
    env_keys: []
    envs: {}
    timeout: 300
  web_fetch:
    name: web_fetch
    enabled: true
    type: stdio
    cmd: uvx
    args:
      - mcp-server-fetch
      - --ignore-robots-txt
    description: Fetch web pages and convert to markdown for analysis
    display_name: Web Fetch
    bundled: false
    env_keys: []
    envs: {}
    timeout: 300
  git:
    name: git
    enabled: true
    type: stdio
    cmd: uvx
    args:
      - mcp-server-git
    description: Git operations - diff, log, blame, commit, branch management
    display_name: Git
    bundled: false
    env_keys: []
    envs: {}
    timeout: 300
